spring.application.name=MS-GATEWAY
server.port=8080

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

jjwt.secret=esta_es_una_clave_secreta_muy_larga_y_segura_para_handfast_2024

spring.cloud.gateway.routes[0].id=ms-auth
spring.cloud.gateway.routes[0].uri=lb://ms-auth
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**

spring.cloud.gateway.routes[1].id=ms-empleados
spring.cloud.gateway.routes[1].uri=lb://ms-empleados
spring.cloud.gateway.routes[1].predicates[0]=Path=/employees/**
spring.cloud.gateway.routes[1].filters[0]=FiltroAutenticacion

spring.cloud.gateway.routes[2].id=ms-logistica
spring.cloud.gateway.routes[2].uri=lb://ms-logistica
spring.cloud.gateway.routes[2].predicates[0]=Path=/logistica/**
spring.cloud.gateway.routes[2].filters[0]=FiltroAutenticacion

spring.cloud.gateway.routes[3].id=ms-sst
spring.cloud.gateway.routes[3].uri=lb://ms-sst
spring.cloud.gateway.routes[3].predicates[0]=Path=/sst/**
spring.cloud.gateway.routes[3].filters[0]=FiltroAutenticacion

spring.cloud.gateway.routes[4].id=ms-incidencias
spring.cloud.gateway.routes[4].uri=lb://ms-incidencias
spring.cloud.gateway.routes[4].predicates[0]=Path=/incidents/**
spring.cloud.gateway.routes[4].filters[0]=FiltroAutenticacion

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true
